<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Taylor's Cleaning Services</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="nav-container">
      <div class="logo">
        <img src="images/logo_transparent2.png" alt="Taylor's Cleaning Logo" class="logo-img">
        <span>TAYLOR'S PRO CLEANING</span>
      </div>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <nav id="nav-menu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Me</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="testimonials.html">Testimonials</a></li>
          <li><a href="contact.html">Contact Me</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- Contact -->
    <section class="contact-hero">
      <h1>Get in Touch</h1>
      <p>Have questions or need a quote? Reach out via email, phone, or use the form below.</p>
    </section>

    <!-- Contact Form Section -->
    <section class="contact-section">
      <div class="contact-container">
        <div class="contact-info">
          <p>Email: <a href="mailto:tjohnson151515@gmail.com">tjohnson151515@gmail.com</a></p>
          <p>Phone: <a href="tel:+2086595870">(208) 659-5870</a></p>
        </div>

        <form class="contact-form" action="https://formspree.io/f/xrergjpb" method="POST">
          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Your Email" required>
          <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
          <input type="hidden" name="_next" value="https://yourusername.github.io/thank-you.html">
          <button type="submit" name="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 Taylor's Pro Cleaning. All Rights Reserved.</p>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.querySelector('nav ul');

    hamburger.addEventListener('click', () => {
      navMenu.classList.toggle('active');
      hamburger.classList.toggle('open');
    });
  </script>

</body>
</html>
